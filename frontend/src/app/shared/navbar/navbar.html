<nav class="navbar navbar-expand-lg position-absolute top-0 start-50 translate-middle-x w-100">
  <div class="container-xl bg-white rounded-5 shadow p-2">
    <a class="navbar-brand" (click)="scrollTo('home')" style="cursor: pointer">
      <img src="public/logo/logo.png" alt="Logo" class="mt-n5 ms-3 logo-nav" />
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNavAltMarkup"
      aria-controls="navbarNavAltMarkup"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav gap-2 align-items-right ms-auto">
        <a class="nav-link btn btn-home d-flex align-items-center gap-2" (click)="scrollTo('home')">
          <img src="public/iconos/home.svg" width="20" alt="Icono Home" />
          Home
        </a>

        <a
          class="nav-link btn btn-quienes-somos d-flex align-items-center gap-2"
          (click)="scrollTo('quienes-somos')"
        >
          <img src="public/iconos/quienes_somos.svg" width="20" alt="Icono Info" />
          Quiénes Somos
        </a>

        <a
          class="nav-link btn btn-contacto d-flex align-items-center gap-2"
          (click)="scrollTo('contacto')"
        >
          <img src="public/iconos/contacto.svg" width="20" alt="Icono Contacto" />
          Contacto
        </a>
        <a class="nav-link btn btn-galeria d-flex align-items-center gap-2" routerLink="/galeria">
          <img src="public/iconos/fichas.svg" width="20" alt="Icono Fichas" />
          Fichas
        </a>
        @if (!isLoggedIn()) {
          <a
            class="nav-link btn btn-login me-3 d-flex align-items-center gap-2"
            routerLink="/login">

            <img
              src="public/iconos/inicio_sesion.svg"
              width="20"
              alt="Icono Usuario" />

            Iniciar sesión
          </a>
        }

        @if (isLoggedIn()) {
          <a
            class="nav-link btn btn-login me-3 d-flex align-items-center gap-2"
            (click)="logout()"
            style="cursor: pointer;">

            <img
              src="public/iconos/sesion_iniciada.svg"
              width="20"
              alt="Cerrar sesión" />

            Cerrar sesión
          </a>
        }
      </div>
    </div>
  </div>
</nav>
